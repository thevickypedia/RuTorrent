[package]
name = "rutorrent"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4"
reqwest = { version = "0.12", features = ["blocking", "cookies", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
actix-rt = "2.11.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "io-util", "time", "sync", "fs"] }
env_logger = "0.11.5"
chrono = "0.4.44"
log = "0.4.22"
ssh2 = "0.9.5"
