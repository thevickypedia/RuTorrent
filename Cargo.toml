[package]
name = "rutorrent"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4.13.0"
reqwest = { version = "0.13.3", features = ["blocking", "cookies", "json", "form"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
actix-rt = "2.11.0"
tokio = { version = "1.52.2", features = ["rt-multi-thread", "macros", "process", "io-util", "time", "sync", "fs"] }
env_logger = "0.11.10"
chrono = "0.4.44"
log = "0.4.29"
uuid = { version = "1.23.1", features = ["v4"] }
